# Test scenario: only IPv6 connectivity (RA + SLAAC).
# anchord-ext should pick up a SLAAC address from fd99::/64 via the
# kernel's autoconf path. anchord itself does not (yet) DHCPv6, so a
# v6 lease on the supervisor side is currently expected NOT to arrive
# through anchord's IPs() channel — the kernel-side autoconf is what
# we observe via `ip -6 addr`. Tracked in CLAUDE.md "DHCPv6 handling".

interface=eth0

no-resolv
no-hosts

enable-ra
dhcp-range=fd99::,fd99::ffff,slaac,64,12h

log-dhcp
log-queries
