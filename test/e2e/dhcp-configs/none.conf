# Test scenario: dnsmasq runs but issues no leases.
# anchord's DHCP client should get no offer and retry indefinitely with
# exponential backoff capped at ANCHORD_DHCP_BACKOFF_MAX. anchord must
# stay alive (not exit) — that's the assertion this scenario covers.

interface=eth0

no-resolv
no-hosts

# No dhcp-range, no enable-ra — dnsmasq is a no-op here.

log-dhcp
log-queries
