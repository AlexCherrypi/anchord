# Scenario: stateful DHCPv6 — server hands out v6 addresses via DHCPv6
# (not SLAAC). RA's M flag is set to "managed addresses". v4 DHCP also
# enabled so we can verify both v4 and v6 acquire leases in parallel.
#
# Difference from `both.conf`: no `slaac` keyword on the v6 dhcp-range,
# so dnsmasq runs DHCPv6 in stateful mode instead of advertising
# SLAAC-only.

interface=eth0
enable-ra
dhcp-range=10.99.0.50,10.99.0.99,255.255.255.0,12h
# Stateful DHCPv6: no slaac flag, server allocates from the pool.
dhcp-range=fd99::50,fd99::99,64,12h
dhcp-authoritative
log-dhcp
