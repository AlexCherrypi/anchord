# Test scenario: only IPv4 leases issued.
# anchord should obtain an IPv4 from 10.99.0.50-99 and end up with no
# global IPv6 on anchord-ext.
#
# Note: do NOT use bind-interfaces here. With bind-interfaces, dnsmasq
# binds raw sockets per interface in a way that fails to receive
# broadcast DHCPDISCOVERs traversing a Docker bridge from a macvlan
# child container in some kernel/Docker combos. The default mode (omit
# both bind-interfaces and bind-dynamic) listens via wildcard with
# SO_BINDTODEVICE, which works reliably here.

interface=eth0

no-resolv
no-hosts

dhcp-range=10.99.0.50,10.99.0.99,255.255.255.0,12h
dhcp-authoritative

log-dhcp
log-queries
