# Test scenario: both DHCPv4 and IPv6 SLAAC.
# anchord-ext should end up with both an IPv4 lease and a SLAAC v6.

interface=eth0
bind-interfaces

no-resolv
no-hosts

dhcp-range=10.99.0.50,10.99.0.99,255.255.255.0,12h

enable-ra
dhcp-range=fd99::,fd99::ffff,slaac,64,12h

dhcp-authoritative

log-dhcp
log-queries
