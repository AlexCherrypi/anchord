# anchord e2e harness — single parameterized stack, fully Docker-native.
#
# Choose a scenario via the SCENARIO env var:
#   SCENARIO=v4-only|v6-only|both|none
#
# Driven by test/e2e/run.sh (which itself runs inside a runner container
# — see test/e2e/up.sh / up.ps1 for the host-side launchers). All build
# contexts are inside test/e2e/ so the harness works under
# Docker-in-Docker without bind-mounting host paths into nested daemons.
#
# Known limitation: when this stack runs on top of Docker Desktop's
# Linux VM (Windows/macOS), L2 frames sent by a macvlan child onto a
# Docker bridge do NOT reliably reach peer veth endpoints. dhclient
# DISCOVERs leave anchord-ext but never arrive at dnsmasq, so v4 lease
# / v6 SLAAC assertions fail in that environment. Everything else
# (anchord boot, nftables, discovery, DNAT map population) is verified
# correctly. Real Linux hosts with a physical VLAN parent are unaffected.

name: anchord-e2e

networks:
  # vlan: simulates the external VLAN. anchord's macvlan child lives on
  # top of anchord's endpoint here. dnsmasq listens here too.
  # internal: true keeps DHCP/RA traffic isolated from the host.
  vlan:
    driver: bridge
    internal: true
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.99.0.0/24
          gateway: 10.99.0.1
        - subnet: fd99::/64
          gateway: fd99::1

  # transit: anchord <-> docker-socket-proxy <-> service-anchors.
  transit:
    driver: bridge
    internal: true
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
        - subnet: fd30::/64

services:
  dhcp:
    # Build context = test/e2e/  (so Dockerfile can COPY dhcp-configs/).
    # All four scenario configs are baked in; SCENARIO env picks one.
    build:
      context: .
      dockerfile: images/dhcp/Dockerfile
    image: anchord-e2e/dnsmasq:latest
    environment:
      SCENARIO: ${SCENARIO:-v4-only}
    cap_add: [NET_ADMIN, NET_RAW]
    sysctls:
      net.ipv6.conf.all.forwarding: "1"
    networks: [vlan]
    restart: "no"

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      NETWORKS: 1
    # The docker socket bind-mount is the daemon's own filesystem,
    # accessible regardless of where compose is invoked from.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [transit]
    restart: "no"

  anchord:
    # anchord:test = anchord:dev + the resolve-vlan.sh shim baked in.
    # Built by run.sh before compose up.
    image: anchord:test
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
      # accept_ra=2 lets the kernel autoconfigure v6 from RAs even when
      # forwarding is enabled. Without this, a forwarding host ignores RAs.
      net.ipv6.conf.all.accept_ra: "2"
      net.ipv6.conf.default.accept_ra: "2"
      # arp_ignore=1 / arp_announce=2 prevent the macvlan parent (eth1
      # here) from claiming ARPs for IPs that live on its macvlan child
      # (anchord-ext). Without it, peers ARP-resolve anchord-ext's IP
      # to eth1's MAC, inbound TCP lands on eth1 instead of anchord-ext,
      # the iifname match in the prerouting DNAT rule misses, and the
      # local stack RSTs the connection. Docker mounts /proc/sys as
      # read-only at runtime, so this MUST be set via compose sysctls.
      net.ipv4.conf.all.arp_ignore: "1"
      net.ipv4.conf.all.arp_announce: "2"
    environment:
      # Must match the compose project name so the discovery filter
      # (com.docker.compose.project=...) hits our own containers.
      ANCHORD_PROJECT: anchord-e2e-${SCENARIO}
      # The shim rewrites this to whichever iface owns the VLAN subnet.
      # Docker's eth0/eth1 ordering between transit and vlan is
      # nondeterministic between runs.
      ANCHORD_VLAN_PARENT: __resolved_by_shim__
      ANCHORD_DHCP_HOSTNAME: e2e-${SCENARIO}
      ANCHORD_LOG_LEVEL: debug
      DOCKER_HOST: tcp://docker-proxy:2375
    networks:
      - transit
      - vlan
    depends_on: [docker-proxy, dhcp]
    restart: "no"

  # A minimal service-anchor running anchord in service-anchor mode.
  # The anchord container's discovery + reconciler picks it up via
  # the anchord.expose label and programs tcp/25 -> this container's
  # transit IP into the nftables map. Service-anchor mode itself
  # resolves the network-anchor's hostname via Docker DNS and keeps
  # this namespace's default route pointed at it (SPEC §2.6) — without
  # which the inbound DNAT path's response would have nowhere to go
  # on `internal: true` bridges.
  smtp-anchor:
    image: anchord:test
    cap_add: [NET_ADMIN]
    environment:
      ANCHORD_MODE: service-anchor
      # `anchord` resolves to the network-anchor's transit IP via
      # Compose-network DNS. Default; spelled out here for clarity.
      ANCHORD_GATEWAY_HOSTNAME: anchord
      ANCHORD_LOG_LEVEL: debug
    networks: [transit]
    depends_on: [anchord]
    labels:
      anchord.expose: "tcp/25"
    restart: "no"

  # Phase-2 listener — joins smtp-anchor's network namespace (the
  # "pod" pattern anchord is built around). When the probe connects
  # to the project's external IP on tcp/25, the kernel DNATs it to
  # smtp-anchor's transit IP, the listener accepts, and writes back
  # the perceived peer address. The probe asserts that address equals
  # its own VLAN-side IP — i.e., MASQUERADE was NOT applied (SPEC S-2).
  smtp-listener:
    build:
      context: .
      dockerfile: images/tcp-echo/Dockerfile
    image: anchord-e2e/tcp-echo:latest
    network_mode: "service:smtp-anchor"
    depends_on: [smtp-anchor]
    restart: "no"

  # Phase-2 probe — a plain host on the VLAN bridge. The harness execs
  # into it to read its own address and to drive `nc` against the
  # project's external IP.
  probe:
    build:
      context: .
      dockerfile: images/probe/Dockerfile
    image: anchord-e2e/probe:latest
    networks: [vlan]
    restart: "no"
